services:
  pocketbase:
    build:
      # Both services use the repo root as context — avoids a Docker Desktop
      # on Windows bug where BuildKit fails to resolve dockerfile paths when
      # services have different contexts.
      context: .
      dockerfile: Dockerfile
    container_name: householdchores-backend
    restart: unless-stopped
    ports:
      - "9010:9010"
    env_file:
      - ./backend/.env
    volumes:
      # pb_data is a bind mount — your database survives any rebuild or update
      - ./backend/pb_data:/pb/pb_data
      - ./backend/pb_migrations:/pb/pb_migrations
      - ./backend/pb_hooks:/pb/pb_hooks
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: householdchores-web
    restart: unless-stopped
    ports:
      - "9011:80"
    depends_on:
      - pocketbase